<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Terra Firma Global">
    <title>Terra Firma Global</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: url('assets/bg.png') center/cover no-repeat fixed;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            color: white;
            padding: 20px;
            max-width: 600px;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 2rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
            font-weight: 300;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2.5rem;
                margin-bottom: 1.5rem;
            }

            h1 {
                font-size: 2rem;
                margin-bottom: 1rem;
            }

            p {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🌍</div>
        <h1>Terra Firma Global</h1>
        <p>Building sustainable solutions<br>for a better tomorrow</p>
    </div>
</body>
</html>
